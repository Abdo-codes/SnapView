name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Package release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          BIN_DIR="$(swift build -c release --show-bin-path)"
          ASSET_NAME="snapview-${VERSION}-macos.tar.gz"
          mkdir -p dist
          cp "${BIN_DIR}/snapview" dist/snapview
          cp LICENSE dist/LICENSE
          chmod +x dist/snapview
          tar -czf "${ASSET_NAME}" -C dist snapview LICENSE
          shasum -a 256 "${ASSET_NAME}" > "${ASSET_NAME}.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            snapview-${{ github.ref_name }}-macos.tar.gz
            snapview-${{ github.ref_name }}-macos.tar.gz.sha256
